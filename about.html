<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About | Summer's Art Site</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <svg class="logo-svg" viewBox="0 0 600 200" aria-label="Summer's Art Site logo" role="img" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="text-clip-about">
          <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" class="logo-fill-text">
            Summer's Art Site
          </text>
        </clipPath>
      </defs>
      <g clip-path="url(#text-clip-about)">
        <image
          href="https://images.unsplash.com/photo-1549887534-4a3b1c8a4c3a?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80"
          x="0"
          y="0"
          width="1200"
          height="800">
          <animateTransform attributeName="transform" type="translate" values="-150 -50; 150 100; -150 -50" dur="18s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" additive="sum" type="scale" values="1; 1.2; 1" dur="12s" repeatCount="indefinite"/>
        </image>
      </g>
      <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" class="logo-outline">
        Summer's Art Site
      </text>
    </svg>

    <nav aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="about.html" class="active">About</a>
      <a href="drawings.html">Drawings</a>
      <a href="travel.html">Travel</a>
    </nav>
  </header>

  <div class="blob" data-i="1"></div>
  <div class="blob" data-i="2"></div>
  <div class="blob" data-i="3"></div>

  <main class="page-shell">
    <section class="profile-card">
      <div class="profile-copy">
        <p class="eyebrow">About Me</p>
        <h1>Hi, I'm Summer.</h1>
        <p class="lead">I love learning new things, playing the violin, writing, and making art.</p>
        <p>
          Some of my favorite hobbies are reading, drawing, and travelling. This website is where I share
          my drawings, travel memories, and creative work in one place.
        </p>
      </div>
      <img class="profile-image" src="IMG_4486.jpg" alt="Portrait of Summer smiling outdoors">
    </section>
  </main>
</body>
</html>
