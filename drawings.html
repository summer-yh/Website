<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drawings | Summer's Art Site</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="loader" aria-hidden="true"></div>

  <header class="site-header">
    <svg class="logo-svg" viewBox="0 0 600 200" aria-label="Summer's Art Site logo" role="img" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="text-clip-drawings">
          <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" class="logo-fill-text">
            Summer's Art Site
          </text>
        </clipPath>
      </defs>
      <g clip-path="url(#text-clip-drawings)">
        <image
          href="https://images.unsplash.com/photo-1549887534-4a3b1c8a4c3a?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80"
          x="0"
          y="0"
          width="1200"
          height="800">
          <animateTransform attributeName="transform" type="translate" values="-150 -50; 150 100; -150 -50" dur="18s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" additive="sum" type="scale" values="1; 1.2; 1" dur="12s" repeatCount="indefinite"/>
        </image>
      </g>
      <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" class="logo-outline">
        Summer's Art Site
      </text>
    </svg>

    <nav aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="drawings.html" class="active">Drawings</a>
      <a href="travel.html">Travel</a>
    </nav>
  </header>

  <div class="blob" data-i="1"></div>
  <div class="blob" data-i="2"></div>
  <div class="blob" data-i="3"></div>

  <main class="page-shell">
    <section class="gallery-section" aria-labelledby="drawings-title">
      <div class="section-heading">
        <p class="eyebrow">Gallery</p>
        <h1 id="drawings-title">My Drawings</h1>
        <p>Click any artwork to see a larger view and read a short caption.</p>
      </div>

      <div class="gallery">
        <img src="IMG_2262 2.jpg" alt="Pen sketch of The Little Giant" onclick="openLightbox(this, 'Pen sketch of The Little Giant')">
        <img src="IMG_2260 3.jpg" alt="Pen sketch of Hinata Shoyo" onclick="openLightbox(this, 'Pen sketch of Hinata Shoyo')">
        <img
          src="IMG_3586.JPG"
          alt="Beach scene in New Caledonia with bungalows and turquoise water"
          onclick="openLightbox(this, `New Caledonia beach, DoubleTree Bungalow Over the Water, 2025/10/2 holiday

The island is about 30 minutes from the mainland by ferry, and has a perimeter of 2 km. Our hotel was a bungalow in the garden, with twisting wooden paths leading to each hut in the shade of tropical plants.

This picture was taken further down the coast, where rocks lined the shoreline and palm trees framed the sand. In the distance, the bungalows stretched over the water in a neat row, surrounded by clear turquoise waves.`, true)">
        <img src="IMG_9790.jpg" alt="Sea turtle seen while snorkeling near the bungalows" onclick="openLightbox(this, 'Turtle seen while snorkeling near the Bungalow Over the Water')">
      </div>
    </section>
  </main>

  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button class="close" type="button" aria-label="Close expanded artwork" onclick="closeLightbox()">&times;</button>
    <div id="lightbox-content" class="lightbox-content">
      <img id="lightbox-img" src="" alt="">
      <p id="lightbox-caption"></p>
    </div>
  </div>

  <script>
    window.addEventListener("load", function () {
      document.querySelector(".loader").classList.add("hidden");
    });

    function openLightbox(imgElement, captionText, isLong = false) {
      const lightbox = document.getElementById("lightbox");
      const content = document.getElementById("lightbox-content");
      const lightboxImg = document.getElementById("lightbox-img");

      content.classList.toggle("narrow", isLong);
      lightboxImg.src = imgElement.src;
      lightboxImg.alt = imgElement.alt;
      document.getElementById("lightbox-caption").textContent = captionText;
      lightbox.style.display = "flex";
      lightbox.setAttribute("aria-hidden", "false");
    }

    function closeLightbox() {
      const lightbox = document.getElementById("lightbox");
      lightbox.style.display = "none";
      lightbox.setAttribute("aria-hidden", "true");
    }

    document.getElementById("lightbox").addEventListener("click", function (event) {
      if (event.target.id === "lightbox") {
        closeLightbox();
      }
    });
  </script>
</body>
</html>
